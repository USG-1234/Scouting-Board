<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scouting-Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14171C; --paper:#FBFBF9; --panel:#FFFFFF;
    --pitch:#0E7C4A; --pitch-soft:#E4F2EA;
    --amber:#B4650F; --amber-soft:#FaF0E1;
    --line:#E6E8E3; --muted:#6B7280; --muted2:#9AA1A9;
    --shadow:0 1px 2px rgba(20,23,28,.04), 0 8px 24px rgba(20,23,28,.05);
    --sans:'Space Grotesk',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:var(--sans); color:var(--ink); background:var(--paper);
    -webkit-font-smoothing:antialiased; line-height:1.45;
  }
  .wrap{max-width:1280px; margin:0 auto; padding:20px 18px 80px}

  /* Header */
  header.top{display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; padding:8px 2px 18px; border-bottom:2px solid var(--ink)}
  .mark{font-weight:700; font-size:22px; letter-spacing:-.02em}
  .mark .dot{color:var(--pitch)}
  .sub{color:var(--muted); font-size:13px; font-family:var(--mono)}
  .spacer{flex:1}
  .counts{font-family:var(--mono); font-size:13px; color:var(--muted)}
  .counts b{color:var(--ink)}
  .counts .opp{color:var(--pitch); font-weight:600}

  /* Dropzone */
  .drop{
    margin:22px 0; border:1.5px dashed #C9CDC6; border-radius:14px; background:var(--panel);
    padding:38px 24px; text-align:center; cursor:pointer; transition:border-color .15s, background .15s;
  }
  .drop:hover, .drop.hot{border-color:var(--pitch); background:var(--pitch-soft)}
  .drop h2{margin:0 0 6px; font-size:17px; font-weight:600}
  .drop p{margin:0; color:var(--muted); font-size:13.5px}
  .drop .pick{color:var(--pitch); text-decoration:underline; font-weight:600}

  /* Controls */
  .controls{display:none; gap:14px; flex-wrap:wrap; align-items:flex-end; margin:6px 0 18px}
  .ctl{display:flex; flex-direction:column; gap:6px}
  .ctl label{font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); font-weight:600}
  .chips{display:flex; gap:6px; flex-wrap:wrap}
  .chip{
    font-family:var(--sans); font-size:13px; padding:6px 11px; border-radius:999px;
    border:1px solid var(--line); background:var(--panel); color:var(--ink); cursor:pointer; transition:.12s;
    white-space:nowrap;
  }
  .chip:hover{border-color:var(--muted2)}
  .chip.on{background:var(--ink); color:#fff; border-color:var(--ink)}
  .chip.on.green{background:var(--pitch); border-color:var(--pitch)}
  input[type=search]{
    font-family:var(--sans); font-size:14px; padding:8px 11px; border:1px solid var(--line);
    border-radius:9px; background:var(--panel); min-width:180px; color:var(--ink);
  }
  input[type=search]:focus{outline:2px solid var(--pitch); outline-offset:1px; border-color:transparent}
  .toggle{display:flex; align-items:center; gap:8px; font-size:13.5px; cursor:pointer; user-select:none; padding-bottom:8px}
  .toggle input{accent-color:var(--pitch); width:16px; height:16px}
  .preset{
    font-family:var(--sans); font-weight:600; font-size:13.5px; padding:9px 15px; border-radius:9px;
    background:var(--pitch); color:#fff; border:none; cursor:pointer; box-shadow:var(--shadow);
  }
  .preset:hover{filter:brightness(1.06)}
  .ghost{background:none; color:var(--muted); border:1px solid var(--line); box-shadow:none}
  .ghost:hover{color:var(--ink); border-color:var(--muted2)}

  /* Table */
  .tablewrap{display:none; border:1px solid var(--line); border-radius:14px; overflow:hidden; background:var(--panel); box-shadow:var(--shadow)}
  .scroll{overflow-x:auto}
  table{width:100%; border-collapse:collapse; font-size:13.5px}
  thead th{
    position:sticky; top:0; background:#F3F4F1; z-index:2;
    text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted);
    font-weight:600; padding:11px 12px; border-bottom:1px solid var(--line); cursor:pointer; white-space:nowrap;
  }
  thead th.num{text-align:right}
  thead th:hover{color:var(--ink)}
  thead th .ar{opacity:.4; font-size:10px; margin-left:3px}
  thead th.sorted{color:var(--ink)}
  thead th.sorted .ar{opacity:1; color:var(--pitch)}
  tbody td{padding:10px 12px; border-bottom:1px solid #F0F1EE; vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:#FafBf9}
  .num{font-family:var(--mono); text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap}
  .player{font-weight:600; letter-spacing:-.01em}
  .club{color:var(--muted); font-size:12.5px}
  .lg{font-family:var(--mono); font-size:11.5px; color:var(--muted); white-space:nowrap}
  .agent a{color:var(--ink); text-decoration:none; border-bottom:1px solid #D9DCD6}
  .agent a:hover{color:var(--pitch); border-color:var(--pitch)}
  .unknown{color:var(--muted2)}
  .pill{display:inline-block; padding:2px 7px; border-radius:6px; font-family:var(--mono); font-size:12px; font-weight:500}
  .pill.small{background:var(--pitch-soft); color:var(--pitch)}
  .pill.short{background:var(--amber-soft); color:var(--amber)}
  /* opportunity accent */
  tbody tr.opp td:first-child{box-shadow:inset 3px 0 0 var(--pitch)}
  .empty{display:none; padding:50px 20px; text-align:center; color:var(--muted)}
  footer.note{display:none; margin-top:16px; font-size:12px; color:var(--muted2); font-family:var(--mono); text-align:center}
  @media (max-width:640px){
    .hide-sm{display:none}
    .wrap{padding:16px 12px 60px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <span class="mark">Scouting<span class="dot">·</span>Board</span>
    <span class="sub">Vertragsrestzeit × Beratergröße</span>
    <span class="spacer"></span>
    <span class="counts" id="counts"></span>
  </header>

  <div class="drop" id="drop">
    <h2>scout_data.csv hier ablegen</h2>
    <p>Datei hierher ziehen oder <span class="pick">auswählen</span> — die Daten bleiben lokal im Browser.</p>
    <input type="file" id="file" accept=".csv,text/csv" hidden>
  </div>

  <div class="controls" id="controls">
    <div class="ctl">
      <label>Liga</label>
      <div class="chips" id="leagueChips"></div>
    </div>
    <div class="ctl">
      <label>Beratergröße höchstens</label>
      <div class="chips" id="agencyChips"></div>
    </div>
    <div class="ctl">
      <label>Restlaufzeit höchstens</label>
      <div class="chips" id="monthsChips"></div>
    </div>
    <div class="ctl" id="ageCtl" style="display:none">
      <label>Alter höchstens</label>
      <div class="chips" id="ageChips"></div>
    </div>
    <div class="ctl" id="mvCtl" style="display:none">
      <label>Marktwert mindestens</label>
      <div class="chips" id="mvChips"></div>
    </div>
    <div class="ctl">
      <label>Suche</label>
      <input type="search" id="q" placeholder="Spieler oder Berater …">
    </div>
    <label class="toggle"><input type="checkbox" id="matchedOnly" checked> nur mit Berater-Wert</label>
    <label class="toggle"><input type="checkbox" id="withContract" checked> nur mit Vertragsdatum</label>
    <div class="ctl">
      <label>&nbsp;</label>
      <button class="preset" id="best">★ Beste Gelegenheiten</button>
    </div>
    <div class="ctl">
      <label>&nbsp;</label>
      <button class="preset ghost" id="reset">Zurücksetzen</button>
    </div>
  </div>

  <div class="tablewrap" id="tablewrap">
    <div class="scroll">
      <table>
        <thead><tr id="head"></tr></thead>
        <tbody id="body"></tbody>
      </table>
    </div>
    <div class="empty" id="empty">Keine Spieler mit diesen Filtern. Filter lockern oder zurücksetzen.</div>
  </div>
  <footer class="note" id="footer"></footer>
</div>

<script>
"use strict";
const TM = "https://www.transfermarkt.de";

// ---------- CSV Parser (quoted fields, CRLF) ----------
function parseCSV(text){
  const rows=[]; let row=[], field="", i=0, q=false;
  if(text.charCodeAt(0)===0xFEFF) text=text.slice(1); // BOM
  while(i<text.length){
    const c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){field+='"'; i+=2; continue;} q=false; i++; continue; }
      field+=c; i++; continue;
    }
    if(c==='"'){ q=true; i++; continue; }
    if(c===','){ row.push(field); field=""; i++; continue; }
    if(c==='\n'){ row.push(field); rows.push(row); row=[]; field=""; i++; continue; }
    if(c==='\r'){ i++; continue; }
    field+=c; i++;
  }
  if(field.length||row.length){ row.push(field); rows.push(row); }
  return rows;
}

// ---------- State ----------
let DATA=[], HAS_MV=false, HAS_AGE=false;
const state={
  leagues:new Set(), maxAgency:null, maxMonths:null, maxAge:null, minMV:null,
  q:"", matchedOnly:true, withContract:true,
  sortKey:"agency_value", sortDir:1
};

const AGENCY_PRESETS=[["100k",100000],["500k",500000],["1 Mio",1000000],["5 Mio",5000000],["25 Mio",25000000],["75 Mio",75000000],["Alle",null]];
const MONTHS_PRESETS=[["6",6],["12",12],["18",18],["24",24],["Alle",null]];
const AGE_PRESETS=[["≤21",21],["≤23",23],["≤25",25],["Alle",null]];
const MV_MIN_PRESETS=[["Alle",null],["500k",500000],["1 Mio",1000000],["5 Mio",5000000],["10 Mio",10000000]];

function ageFrom(bd){
  const m=(bd||"").match(/(\d{2})\.(\d{2})\.(\d{4})/); if(!m) return null;
  const b=new Date(+m[3],+m[2]-1,+m[1]), n=new Date();
  let a=n.getFullYear()-b.getFullYear();
  if(n.getMonth()<b.getMonth()||(n.getMonth()===b.getMonth()&&n.getDate()<b.getDate())) a--;
  return a;
}

// ---------- Formatting ----------
function eur(n){ n=+n; if(!n||n<=0) return "–";
  if(n>=1e9) return "€"+(n/1e9).toFixed(2).replace(".",",")+" Mrd.";
  if(n>=1e6) return "€"+(n/1e6).toFixed(2).replace(".",",")+" Mio.";
  if(n>=1e3) return "€"+Math.round(n/1e3)+" Tsd.";
  return "€"+n;
}
function num(v){ const n=parseInt(v,10); return isNaN(n)?null:n; }

// ---------- Load ----------
function ingest(text){
  const rows=parseCSV(text).filter(r=>r.length>1);
  if(!rows.length) return;
  const head=rows[0].map(h=>h.trim());
  const idx={}; head.forEach((h,i)=>idx[h]=i);
  const need=["player","club","league","birthdate","contract_raw","months_left","agent","agency_value","agency_players","agency_matched","agent_url"];
  DATA=rows.slice(1).map(r=>{
    const o={};
    need.forEach(k=> o[k]= idx[k]!=null ? r[idx[k]] : "");
    o.market_value = idx["market_value"]!=null ? num(r[idx["market_value"]])||0 : 0;
    o.age = idx["age"]!=null ? num(r[idx["age"]]) : ageFrom(o.birthdate);
    o.months_left = num(o.months_left);            // null if empty
    o.agency_value = num(o.agency_value)||0;
    o.agency_players = num(o.agency_players);
    o.matched = String(o.agency_matched).toLowerCase()==="true";
    return o;
  }).filter(o=>o.player);
  HAS_MV = DATA.some(d=>d.market_value>0);
  HAS_AGE = DATA.some(d=>d.age!=null);

  // leagues in sensible order
  const order=["1. Bundesliga","2. Bundesliga","3. Liga"];
  const found=[...new Set(DATA.map(d=>d.league))];
  found.sort((a,b)=>(order.indexOf(a)+99*(order.indexOf(a)<0))-(order.indexOf(b)+99*(order.indexOf(b)<0)));
  state.leagues=new Set(found);

  buildChips(found);
  buildHead();
  document.getElementById("drop").style.display="none";
  document.getElementById("controls").style.display="flex";
  document.getElementById("tablewrap").style.display="block";
  document.getElementById("footer").style.display="block";
  render();
}

// ---------- Chips ----------
function buildChips(leagues){
  const lc=document.getElementById("leagueChips"); lc.innerHTML="";
  leagues.forEach(lg=>{
    const b=document.createElement("button"); b.className="chip on"; b.textContent=lg;
    b.onclick=()=>{ b.classList.toggle("on"); if(state.leagues.has(lg)) state.leagues.delete(lg); else state.leagues.add(lg); render(); };
    lc.appendChild(b);
  });
  const ac=document.getElementById("agencyChips"); ac.innerHTML="";
  AGENCY_PRESETS.forEach(([lab,val])=>{
    const b=document.createElement("button"); b.className="chip"+(val===state.maxAgency?" on green":"");
    b.textContent=lab;
    b.onclick=()=>{ state.maxAgency=val; syncChips(ac,val,AGENCY_PRESETS,"green"); render(); };
    ac.appendChild(b);
  });
  const mc=document.getElementById("monthsChips"); mc.innerHTML="";
  MONTHS_PRESETS.forEach(([lab,val])=>{
    const b=document.createElement("button"); b.className="chip"+(val===state.maxMonths?" on":"");
    b.textContent=lab;
    b.onclick=()=>{ state.maxMonths=val; syncChips(mc,val,MONTHS_PRESETS,""); render(); };
    mc.appendChild(b);
  });
  if(HAS_AGE){
    document.getElementById("ageCtl").style.display="flex";
    const gc=document.getElementById("ageChips"); gc.innerHTML="";
    AGE_PRESETS.forEach(([lab,val])=>{
      const b=document.createElement("button"); b.className="chip"+(val===state.maxAge?" on":"");
      b.textContent=lab;
      b.onclick=()=>{ state.maxAge=val; syncChips(gc,val,AGE_PRESETS,""); render(); };
      gc.appendChild(b);
    });
  }
  if(HAS_MV){
    document.getElementById("mvCtl").style.display="flex";
    const vc=document.getElementById("mvChips"); vc.innerHTML="";
    MV_MIN_PRESETS.forEach(([lab,val])=>{
      const b=document.createElement("button"); b.className="chip"+(val===state.minMV?" on":"");
      b.textContent=lab;
      b.onclick=()=>{ state.minMV=val; syncChips(vc,val,MV_MIN_PRESETS,""); render(); };
      vc.appendChild(b);
    });
  }
}
function syncChips(container,val,presets,extra){
  [...container.children].forEach((b,i)=>{
    b.className="chip"+(presets[i][1]===val?(" on "+extra).trimEnd():"");
  });
}

// ---------- Columns ----------
const COLS=[
  {k:"player",label:"Spieler",cls:""},
  {k:"club",label:"Verein",cls:"hide-sm"},
  {k:"league",label:"Liga",cls:""},
  {k:"age",label:"Alter",cls:"num",age:true},
  {k:"contract_raw",label:"Vertrag bis",cls:"hide-sm"},
  {k:"months_left",label:"Rest",cls:"num"},
  {k:"market_value",label:"Marktwert",cls:"num",mv:true},
  {k:"agent",label:"Berater",cls:""},
  {k:"agency_value",label:"Beratergröße",cls:"num"},
  {k:"agency_players",label:"Klienten",cls:"num hide-sm"},
];
function activeCols(){ return COLS.filter(c=>(!c.mv||HAS_MV)&&(!c.age||HAS_AGE)); }

function buildHead(){
  const tr=document.getElementById("head"); tr.innerHTML="";
  activeCols().forEach(c=>{
    const th=document.createElement("th");
    th.className=c.cls+(state.sortKey===c.k?" sorted":"");
    th.innerHTML=c.label+' <span class="ar">'+(state.sortKey===c.k?(state.sortDir>0?"▲":"▼"):"")+'</span>';
    th.onclick=()=>{ if(state.sortKey===c.k) state.sortDir*=-1; else {state.sortKey=c.k; state.sortDir = (c.cls.includes("num")?1:1);} buildHead(); render(); };
    tr.appendChild(th);
  });
}

// ---------- Filter + Sort ----------
function passes(d){
  if(!state.leagues.has(d.league)) return false;
  if(state.matchedOnly && !(d.matched && d.agency_value>0)) return false;
  if(state.withContract && d.months_left===null) return false;
  if(state.maxAgency!==null){ if(!(d.agency_value>0 && d.agency_value<=state.maxAgency)) return false; }
  if(state.maxMonths!==null){ if(d.months_left===null || d.months_left>state.maxMonths) return false; }
  if(state.maxAge!==null && HAS_AGE){ if(d.age===null || d.age>state.maxAge) return false; }
  if(state.minMV!==null && HAS_MV){ if(!(d.market_value>=state.minMV)) return false; }
  if(state.q){ const s=state.q.toLowerCase(); if(!(d.player.toLowerCase().includes(s)||d.agent.toLowerCase().includes(s))) return false; }
  return true;
}
// unknown (0 / null) always sorts to the bottom regardless of direction
function cmp(a,b){
  const k=state.sortKey, dir=state.sortDir;
  let va=a[k], vb=b[k];
  const numeric=["months_left","agency_value","agency_players","market_value","age"].includes(k);
  if(numeric){
    const ua=(va===null||va<=0), ub=(vb===null||vb<=0);
    if(ua&&ub) return 0; if(ua) return 1; if(ub) return -1;   // unknowns last
    return (va-vb)*dir;
  }
  va=(va||"").toString().toLowerCase(); vb=(vb||"").toString().toLowerCase();
  return va<vb?-1*dir : va>vb?1*dir : 0;
}
function isOpp(d){ return d.matched && d.agency_value>0 && d.agency_value<=1000000 && d.months_left!==null && d.months_left<=12; }

// ---------- Render ----------
function render(){
  const rows=DATA.filter(passes).sort(cmp);
  const body=document.getElementById("body"); body.innerHTML="";
  const cols=activeCols();
  const frag=document.createDocumentFragment();
  let oppCount=0;
  for(const d of rows){
    const tr=document.createElement("tr");
    if(isOpp(d)){ tr.className="opp"; oppCount++; }
    for(const c of cols){
      const td=document.createElement("td"); td.className=c.cls;
      if(c.k==="player"){ td.className="player"; td.textContent=d.player; }
      else if(c.k==="club"){ td.className="club "+c.cls; td.textContent=d.club; }
      else if(c.k==="league"){ td.innerHTML='<span class="lg">'+d.league.replace("Bundesliga","BL")+'</span>'; }
      else if(c.k==="age"){
        td.className="num";
        if(d.age===null){ td.innerHTML='<span class="unknown">–</span>'; }
        else { td.textContent=d.age; if(d.birthdate) td.title=d.birthdate; }
      }
      else if(c.k==="contract_raw"){ td.className="num "+c.cls; td.textContent=d.contract_raw||"–"; }
      else if(c.k==="months_left"){
        td.className="num";
        if(d.months_left===null){ td.innerHTML='<span class="unknown">–</span>'; }
        else if(d.months_left<=12){ td.innerHTML='<span class="pill short">'+d.months_left+' M</span>'; }
        else td.textContent=d.months_left+" M";
      }
      else if(c.k==="market_value"){ td.className="num"; td.textContent=d.market_value>0?eur(d.market_value):"–"; }
      else if(c.k==="agent"){
        td.className="agent";
        const url=d.agent_url? TM+d.agent_url : null;
        td.innerHTML = url? '<a href="'+url+'" target="_blank" rel="noopener">'+escapeHtml(d.agent)+'</a>' : escapeHtml(d.agent||"–");
      }
      else if(c.k==="agency_value"){
        td.className="num";
        if(!d.matched||d.agency_value<=0) td.innerHTML='<span class="unknown">unbek.</span>';
        else if(d.agency_value<=1000000) td.innerHTML='<span class="pill small">'+eur(d.agency_value)+'</span>';
        else td.textContent=eur(d.agency_value);
      }
      else if(c.k==="agency_players"){ td.className="num "+c.cls; td.innerHTML=d.agency_players!=null?d.agency_players:'<span class="unknown">–</span>'; }
      tr.appendChild(td);
    }
    frag.appendChild(tr);
  }
  body.appendChild(frag);
  document.getElementById("empty").style.display = rows.length? "none":"block";
  document.getElementById("counts").innerHTML =
    '<b>'+rows.length+'</b> von '+DATA.length+' · <span class="opp">'+oppCount+' Gelegenheiten</span>';
  document.getElementById("footer").textContent =
    "Gelegenheit = Beratergröße ≤ 1 Mio. und Restlaufzeit ≤ 12 Monate · Spalten anklicken zum Sortieren · unbekannte Werte stehen immer unten";
}
function escapeHtml(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

// ---------- Presets ----------
document.getElementById("best").onclick=()=>{
  state.matchedOnly=true; document.getElementById("matchedOnly").checked=true;
  state.withContract=true; document.getElementById("withContract").checked=true;
  state.maxAgency=75000000;   // Agentur unter 75 Mio
  state.maxMonths=11;         // weniger als 12 Monate Restvertrag
  state.maxAge=24;            // unter 25 Jahre
  state.minMV=1000000;        // mindestens 1 Mio Marktwert
  state.sortKey="agency_value"; state.sortDir=1; state.q=""; document.getElementById("q").value="";
  document.querySelectorAll("#leagueChips .chip").forEach(b=>b.classList.add("on"));
  state.leagues=new Set([...new Set(DATA.map(d=>d.league))]);
  syncChips(document.getElementById("agencyChips"),75000000,AGENCY_PRESETS,"green");
  syncChips(document.getElementById("monthsChips"),11,MONTHS_PRESETS,"");
  if(HAS_AGE) syncChips(document.getElementById("ageChips"),24,AGE_PRESETS,"");
  if(HAS_MV) syncChips(document.getElementById("mvChips"),1000000,MV_MIN_PRESETS,"");
  buildHead(); render();
};
document.getElementById("reset").onclick=()=>{
  state.maxAgency=null; state.maxMonths=null; state.maxAge=null; state.minMV=null; state.q=""; state.matchedOnly=true; state.withContract=true;
  state.sortKey="agency_value"; state.sortDir=1;
  document.getElementById("q").value="";
  document.getElementById("matchedOnly").checked=true;
  document.getElementById("withContract").checked=true;
  state.leagues=new Set([...new Set(DATA.map(d=>d.league))]);
  document.querySelectorAll("#leagueChips .chip").forEach(b=>b.classList.add("on"));
  syncChips(document.getElementById("agencyChips"),null,AGENCY_PRESETS,"green");
  syncChips(document.getElementById("monthsChips"),null,MONTHS_PRESETS,"");
  if(HAS_AGE) syncChips(document.getElementById("ageChips"),null,AGE_PRESETS,"");
  if(HAS_MV) syncChips(document.getElementById("mvChips"),null,MV_MIN_PRESETS,"");
  buildHead(); render();
};
document.getElementById("q").addEventListener("input",e=>{ state.q=e.target.value; render(); });
document.getElementById("matchedOnly").addEventListener("change",e=>{ state.matchedOnly=e.target.checked; render(); });
document.getElementById("withContract").addEventListener("change",e=>{ state.withContract=e.target.checked; render(); });

// ---------- File intake ----------
const drop=document.getElementById("drop"), file=document.getElementById("file");
drop.onclick=()=>file.click();
file.onchange=e=>{ const f=e.target.files[0]; if(f) f.text().then(ingest); };
["dragenter","dragover"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault(); drop.classList.add("hot");}));
["dragleave","drop"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault(); drop.classList.remove("hot");}));
drop.addEventListener("drop",e=>{ const f=e.dataTransfer.files[0]; if(f) f.text().then(ingest); });

// ---------- Auto-Load eingebetteter Daten ----------
(function(){
  const el=document.getElementById("embedded-csv");
  if(el && el.textContent.trim().length>50){
    try{ ingest(el.textContent); }catch(e){ console.error("Embedded CSV load failed", e); }
  }
})();
</script>
